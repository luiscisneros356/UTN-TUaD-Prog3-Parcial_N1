<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Carrito</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <h1>Food<strong>Store</strong></h1>
            </div>
            <nav class="header-nav">
                <a href="../home/home.html">Catálogo</a>
                <a href="./cart.html" class="cart-link">Carrito <span id="cart-badge" class="cart-badge">0</span></a>
            </nav>
        </header>

        <main class="cart-page">
            <div class="cart-content">
                <div class="cart-left">
                    <h2 class="cart-title">Mi Carrito</h2>
                    <div id="cart-items-list" class="cart-items-list">
                        <!-- Contenido del carrito se generará aquí -->
                    </div>

                    <div id="empty-cart-message" class="empty-cart" style="display: none;">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='50' text-anchor='middle' fill='%23999'%3E🛒%3C/text%3E%3C/svg%3E"
                            alt="Carrito vacío">
                        <p>Tu carrito está vacío</p>
                        <a href="../home/home.html">Ver catálogo</a>
                    </div>
                </div>

                <div class="cart-right">
                    <div class="cart-summary">
                        <h3>Resumen</h3>
                        <div class="summary-item">
                            <span>Subtotal</span>
                            <span id="subtotal">$0</span>
                        </div>
                        <div class="summary-total">
                            <span>Total</span>
                            <span id="total">$0</span>
                        </div>
                        <button id="checkout-btn" class="checkout-btn">Finalizar compra</button>
                        <p class="checkout-warning">⚠️ El checkout no está disponible en esta versión.</p>
                        <button id="empty-cart-btn" class="empty-cart-btn">Vaciar carrito</button>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 Food Store. Todos los derechos reservados.</p>
        </footer>
    </div>

    <script type="module" src="./cart.ts"></script>
</body>

</html>
