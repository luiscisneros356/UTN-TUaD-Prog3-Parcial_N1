<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Catálogo</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <h1>Food<strong>Store</strong></h1>
            </div>
            <nav class="header-nav">
                <a href="../../index.html">Catálogo</a>
                <a href="../cart/cart.html" class="cart-link">Carrito <span id="cart-badge"
                        class="cart-badge">0</span></a>
            </nav>
        </header>

        <main>
            <div class="content">
                <!-- Sidebar con categorías -->
                <aside class="sidebar">
                    <h2>Categorías</h2>
                    <div id="categories-list">
                        <!-- Se genera dinámicamente con JS -->
                    </div>
                </aside>

                <!-- Sección principal -->
                <section class="catalog">
                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="Buscar productos...">
                    </div>

                    <div id="products-list" class="products-grid">
                        <!-- Se genera dinámicamente con JS -->
                    </div>
                </section>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 Food Store. Todos los derechos reservados.</p>
        </footer>
    </div>

    <script type="module" src="./home.ts"></script>
    <div id="toast-container"></div>
</body>

</html>
